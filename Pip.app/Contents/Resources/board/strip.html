<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: rgba(22, 22, 22, 0.97);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    border-radius: 16px;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    padding: 12px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    direction: ltr;
    width: 100%;
    height: 100%;
  }
  .app {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    padding: 0;
    border-radius: 14px;
    transition: background 0.1s ease, transform 0.1s ease;
    -webkit-tap-highlight-color: transparent;
    min-width: 100%;
    min-height: 100%;
  }
  .app:hover {
    background: rgba(255,255,255,0.08);
    transform: scale(1.06);
  }
  .app:active { transform: scale(0.9); }
  .app img {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    pointer-events: none;
  }
  .app .name {
    font-size: 9px;
    font-weight: 500;
    color: #666;
    text-align: center;
    white-space: nowrap;
    max-width: 56px;
    overflow: hidden;
    text-overflow: ellipsis;
    pointer-events: none;
  }
  .app:hover .name { color: #aaa; }
</style>
</head>
<body>
<div class="grid" id="grid"></div>
<script>
  let allApps = [];
  let usage = {};
  const grid = document.getElementById('grid');

  function getTop9() {
    // Sort by total seconds of usage, then by last used
    return [...allApps].sort((a, b) => {
      const secA = (usage[a] || {}).seconds || 0;
      const secB = (usage[b] || {}).seconds || 0;
      if (secB !== secA) return secB - secA;
      const countA = (usage[a] || {}).count || 0;
      const countB = (usage[b] || {}).count || 0;
      if (countB !== countA) return countB - countA;
      return ((usage[b] || {}).last || 0) - ((usage[a] || {}).last || 0);
    }).slice(0, 9);
  }

  function shortName(name) {
    const map = {'DaVinci Resolve':'DaVinci','GitHub Desktop':'GitHub',
                 'Ajustes del Sistema':'Ajustes','Vista Previa':'Preview'};
    return map[name] || (name.length > 10 ? name.slice(0,9)+'…' : name);
  }

  function render() {
    const top = getTop9();
    // Most used (#0) → 7 (bottom-center, directly above Dock icon)
    const order = [7, 4, 3, 5, 1, 0, 2, 6, 8];
    const placed = new Array(9).fill(null);
    top.forEach((name, i) => {
      if (i < 9) placed[order[i]] = name;
    });
    grid.innerHTML = '';
    placed.forEach(name => {
      if (!name) return;
      const div = document.createElement('div');
      div.className = 'app';
      div.onclick = () => launch(name);
      div.innerHTML = `<img src="icons/${encodeURIComponent(name)}.png" onerror="this.style.display='none'"><div class="name">${shortName(name)}</div>`;
      grid.appendChild(div);
    });
  }

  async function fetchApps() {
    try {
      const res = await fetch('http://localhost:9111/apps');
      allApps = await res.json();
    } catch(e) {}
  }

  async function fetchUsage() {
    try {
      const res = await fetch('http://localhost:9111/usage');
      usage = await res.json();
    } catch(e) {}
  }

  async function launch(appName) {
    try {
      await fetch(`http://localhost:9111/launch/${encodeURIComponent(appName)}`);
      if (!usage[appName]) usage[appName] = { count: 0, last: 0 };
      usage[appName].count++;
      usage[appName].last = Date.now() / 1000;
      // Tell Swift app to hide via webkit message handler or URL scheme
      window.location.href = 'pip://hide';
    } catch(e) {}
  }

  async function init() {
    await fetchApps();
    await fetchUsage();
    render();
  }
  init();
</script>
</body>
</html>
